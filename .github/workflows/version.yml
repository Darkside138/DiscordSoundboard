name: Docker Version Release
permissions:
  contents: read

on:
  create:
    tags:
      - v*
    branches:
      - '**'

jobs:

  docker-version:
    runs-on: ubuntu-latest

    steps:

      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/discordsoundboard:${{ steps.get_version.outputs.VERSION }}

      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.BUILD_WEBHOOK_TOKEN }}
        uses: Ilshidur/action-discord@master
        if: success()
        with:
          args: 'Discord Soundboard: {{ EVENT_PAYLOAD.repository.full_name }} has been deployed.'
